name: CI Build Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 22
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '22'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Gradle build verification (includes v0.1-v0.3 regression suites)
        run: ./gradlew clean buildVerification

      - name: Build shadow jar
        run: ./gradlew :modules:ontology-cli:shadowJar

      - name: Run npm launcher smoke tests
        working-directory: npm
        run: |
          export OWL4AGENTS_RUNTIME="$GITHUB_WORKSPACE/modules/ontology-cli/build/libs/owl4agents.jar"
          node test/launcher.test.js

      - name: Verify setup --check
        run: java -jar modules/ontology-cli/build/libs/owl4agents.jar setup --check

      - name: Verify setup --init (idempotent)
        run: |
          java -jar modules/ontology-cli/build/libs/owl4agents.jar setup --init
          java -jar modules/ontology-cli/build/libs/owl4agents.jar setup --init
          # Second run should still exit 0 (idempotent)

      - name: Verify setup --check --dry-run (no side effects)
        run: java -jar modules/ontology-cli/build/libs/owl4agents.jar setup --check --dry-run

      - name: Verify smoke test (includes MCP readiness)
        run: |
          export OWL4AGENTS_HOME="$RUNNER_TEMP/owl4agents-smoke-home"
          export OWL4AGENTS_RUNTIME="$GITHUB_WORKSPACE/modules/ontology-cli/build/libs/owl4agents.jar"
          java -jar modules/ontology-cli/build/libs/owl4agents.jar smoke --workspace smoke-demo --mcp-readiness --timeout 30

      - name: Verify mcp-config --client generic
        run: java -jar modules/ontology-cli/build/libs/owl4agents.jar mcp-config --client generic

      - name: Verify mcp-config --client claude
        run: java -jar modules/ontology-cli/build/libs/owl4agents.jar mcp-config --client claude

      - name: Verify mcp-config rejects unknown client
        run: |
          # Must exit nonzero and stderr must contain "Unsupported client"
          if java -jar modules/ontology-cli/build/libs/owl4agents.jar mcp-config --client unknown 2>/dev/null; then
            echo "FAIL: unknown client should exit nonzero"
            exit 1
          fi
          if ! java -jar modules/ontology-cli/build/libs/owl4agents.jar mcp-config --client unknown 2>&1 | grep -q "Unsupported client"; then
            echo "FAIL: stderr should mention Unsupported client"
            exit 1
          fi
          echo "PASS: unknown client rejected with nonzero exit and diagnostic"

      - name: Verify --version
        run: java -jar modules/ontology-cli/build/libs/owl4agents.jar --version | grep -q "0.4.0"

      - name: v0.4 Example validation — claim verification
        run: |
          export OWL4AGENTS_RUNTIME="$GITHUB_WORKSPACE/modules/ontology-cli/build/libs/owl4agents.jar"
          export OWL4AGENTS_HOME="$RUNNER_TEMP/owl4agents-claim-demo"
          # Import golden ontology into claim-demo workspace
          node npm/bin/owl4agents.js import test/corpus/golden/v0.3-claim-verification.owl v0.3-claim-verification --workspace claim-demo
          # Run reasoner (required for subclass entailment)
          node npm/bin/owl4agents.js reason v0.3-claim-verification --workspace claim-demo
          # Verify supported claim
          node npm/bin/owl4agents.js verify-claim v0.3-claim-verification --claim test/fixtures/v0.3/claim-supported.json --workspace claim-demo --json | grep -q "supported"
          # Verify contradicted claim (Dog compatibleWith Cat — disjoint)
          node npm/bin/owl4agents.js verify-claim v0.3-claim-verification --claim test/fixtures/v0.3/claim-contradicted.json --workspace claim-demo --json | grep -q "contradicted"
          # Verify unknown claim
          node npm/bin/owl4agents.js verify-claim v0.3-claim-verification --claim test/fixtures/v0.3/claim-unknown.json --workspace claim-demo --json | grep -q "unknown"
          # Verify out_of_scope claim
          node npm/bin/owl4agents.js verify-claim v0.3-claim-verification --claim test/fixtures/v0.3/claim-real-out-of-scope.json --workspace claim-demo --json | grep -q "out_of_scope"
          echo "PASS: claim-verification example validation (all 4 verdicts)"

      - name: v0.4 Example validation — pizza reasoning
        run: |
          export OWL4AGENTS_RUNTIME="$GITHUB_WORKSPACE/modules/ontology-cli/build/libs/owl4agents.jar"
          export OWL4AGENTS_HOME="$RUNNER_TEMP/owl4agents-pizza-demo"
          # Import Pizza ontology into pizza-demo workspace
          node npm/bin/owl4agents.js import test/corpus/smoke/pizza.owl pizza --workspace pizza-demo
          # Get summary
          node npm/bin/owl4agents.js summary pizza --workspace pizza-demo | grep -q "pizza"
          # Get entity context for Pizza class
          node npm/bin/owl4agents.js entity pizza "http://www.co-ode.org/ontologies/pizza/pizza.owl#Pizza" --workspace pizza-demo | grep -qi "pizza"
          # Classify
          node npm/bin/owl4agents.js classify pizza --workspace pizza-demo | grep -qi "hermit"
          # Get properties
          node npm/bin/owl4agents.js properties pizza --property "http://www.co-ode.org/ontologies/pizza/pizza.owl#hasBase" --workspace pizza-demo | grep -qi "hasBase"
          echo "PASS: pizza-reasoning example validation (5 steps)"

      - name: v0.4 Example validation — biomedical grounding
        run: |
          export OWL4AGENTS_RUNTIME="$GITHUB_WORKSPACE/modules/ontology-cli/build/libs/owl4agents.jar"
          export OWL4AGENTS_HOME="$RUNNER_TEMP/owl4agents-bio-demo"
          # Import biomedical golden ontology into bio-demo workspace
          node npm/bin/owl4agents.js import test/corpus/golden/v0.4-biomedical-grounding.owl v0.4-biomedical-grounding --workspace bio-demo
          # Search for Hypertension
          node npm/bin/owl4agents.js search v0.4-biomedical-grounding Hypertension --workspace bio-demo | grep -q "Hypertension"
          # Get entity context for Hypertension
          node npm/bin/owl4agents.js entity v0.4-biomedical-grounding "http://example.org/v0.4-biomedical#Hypertension" --workspace bio-demo | grep -qi "Hypertension"
          # Run reasoner (required for subclass entailment)
          node npm/bin/owl4agents.js reason v0.4-biomedical-grounding --workspace bio-demo
          # Verify supported claim (Hypertension subClassOf Disease)
          node npm/bin/owl4agents.js verify-claim v0.4-biomedical-grounding --claim test/fixtures/v0.4/claim-bio-supported.json --workspace bio-demo --json | grep -q "supported"
          # Verify unknown claim
          node npm/bin/owl4agents.js verify-claim v0.4-biomedical-grounding --claim test/fixtures/v0.4/claim-bio-unknown.json --workspace bio-demo --json | grep -q "unknown"
          # Verify out_of_scope claim
          node npm/bin/owl4agents.js verify-claim v0.4-biomedical-grounding --claim test/fixtures/v0.4/claim-bio-out-of-scope.json --workspace bio-demo --json | grep -q "out_of_scope"
          echo "PASS: biomedical-grounding example validation (7 steps)"

      - name: v0.4 Example validation — MCP readiness (agent-mcp)
        run: |
          export OWL4AGENTS_RUNTIME="$GITHUB_WORKSPACE/modules/ontology-cli/build/libs/owl4agents.jar"
          export OWL4AGENTS_HOME="$RUNNER_TEMP/owl4agents-example-mcp"
          node npm/bin/owl4agents.js smoke --workspace mcp-demo --mcp-readiness --timeout 30
          echo "PASS: agent-mcp MCP readiness validation"

  release-assets:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 22
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '22'

      - name: Build release jar
        run: ./gradlew :modules:ontology-cli:shadowJar

      - name: Validate CHANGELOG has current version entry
        run: |
          grep -q "## 0.4.0" CHANGELOG.md || { echo "FAIL: CHANGELOG.md missing 0.4.0 entry"; exit 1; }

      - name: Generate checksum
        run: |
          sha256sum modules/ontology-cli/build/libs/owl4agents.jar > modules/ontology-cli/build/libs/owl4agents.jar.sha256
          echo "Checksum generated:"
          cat modules/ontology-cli/build/libs/owl4agents.jar.sha256

      - name: Generate release notes from CHANGELOG
        run: |
          # Extract the v0.4.0 section from CHANGELOG.md (from "## 0.4.0" to the next "##" header)
          sed -n '/^## 0\.4\.0/,/^## [0-9]/{ /^## [0-9]/!p; }' CHANGELOG.md > modules/ontology-cli/build/libs/release-notes-v0.4.0.md
          echo "Release notes generated:"
          cat modules/ontology-cli/build/libs/release-notes-v0.4.0.md
          # Verify it is non-empty
          if [ ! -s modules/ontology-cli/build/libs/release-notes-v0.4.0.md ]; then
            echo "FAIL: release notes file is empty"
            exit 1
          fi

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: owl4agents-release
          path: |
            modules/ontology-cli/build/libs/owl4agents.jar
            modules/ontology-cli/build/libs/owl4agents.jar.sha256
            modules/ontology-cli/build/libs/release-notes-v0.4.0.md
          retention-days: 30